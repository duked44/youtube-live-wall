name: Check live channels

on:
  schedule:
    # GitHub's minimum scheduled interval is 5 minutes, and it can be delayed
    # further under load. Every 10 minutes is a reasonable, well-behaved default.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}
  push:
    paths:
      - "channels.json"
      - "scripts/check-live.mjs"

permissions:
  contents: write

concurrency:
  group: check-live
  cancel-in-progress: false

jobs:
  check-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check channel live status
        run: node scripts/check-live.mjs

      - name: Commit status.json if changed
        run: |
          if git diff --quiet -- data/status.json; then
            echo "No change in live status, skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/status.json
          git commit -m "chore: update live status"
          git push
