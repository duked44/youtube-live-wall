name: Check live channels

on:
  schedule:
    # 5 minutes is the fastest interval GitHub's scheduler supports. Actual
    # runs can still land a few minutes late under load.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}
  push:
    paths:
      - "channels.json"
      - "scripts/check-live.mjs"

permissions:
  contents: write

concurrency:
  group: check-live
  cancel-in-progress: false

jobs:
  check-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check channel live status
        run: node scripts/check-live.mjs

      - name: Commit status.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- data/status.json data/run-log.json; then
            echo "No change in live status, skipping commit."
            exit 0
          fi

          git add data/status.json data/run-log.json
          git commit -m "chore: update live status"

          # Overlapping runs can race to push (5-minute schedule + manual
          # triggers). On rejection, rebase our commit onto the latest
          # remote tip and retry rather than failing the whole run.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt), retrying against latest origin/master..."
            git fetch origin master
            git reset --soft origin/master
            git commit -m "chore: update live status" --allow-empty
            sleep $((RANDOM % 4 + 1))
          done

          echo "Failed to push after multiple attempts." >&2
          exit 1
